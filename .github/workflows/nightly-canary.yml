name: nightly-canary

on:
  schedule:
    # Every day at 06:00 UTC (= 14:00 China time, 02:00 US Eastern).
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      engines:
        description: "Comma-separated engine subset (blank = all)"
        required: false
        default: ""
      parallel:
        description: "Concurrent workers"
        required: false
        default: "4"

jobs:
  canary:
    name: Canary across all engines
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install AgentSearch + deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          # cloakbrowser pulls a Chromium binary on first run.
          python -c "import cloakbrowser; cloakbrowser.ensure_binary()"

      - name: Run nightly canary
        id: canary
        env:
          AGENTSEARCH_LOG: WARNING
        run: |
          python tests/nightly_canary.py \
            --engines "${{ github.event.inputs.engines }}" \
            --parallel "${{ github.event.inputs.parallel || '4' }}" \
            --report canary_report.json
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-report-${{ github.run_id }}
          path: canary_report.json
          retention-days: 30

      - name: Open GitHub issue on regression
        if: steps.canary.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('canary_report.json', 'utf8'));
            const failures = report.engines
              .filter(r => r.status !== 'PASS')
              .map(r => `- **${r.engine}** (${r.status}): ${r.results} hits in ${r.elapsed_s}s` +
                        (r.error ? ` — \`${r.error}\`` : ''))
              .join('\n');

            const title = `🚨 Nightly canary regression — ${report.failed + report.empty}/${report.total} engines unhealthy`;
            const body = [
              `Pass rate: **${(report.pass_rate * 100).toFixed(1)}%**`,
              `(${report.passed} PASS · ${report.empty} EMPTY · ${report.failed} FAIL)`,
              ``,
              `## Unhealthy engines`,
              failures,
              ``,
              `Report artifact: [canary-report-${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            // Avoid duplicate issues — look for an open one with the same prefix.
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'canary-regression',
            });
            if (open.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['canary-regression'],
              });
            }

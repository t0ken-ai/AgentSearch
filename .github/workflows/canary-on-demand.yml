name: canary-on-demand

# AgentSearch's nightly canary is designed to run on the user's own
# residential IP, not on shared CI runners. GitHub Actions runners use
# Azure datacenter IPs that are pre-blocked / rate-throttled by Reddit,
# Cloudflare, DataDome, and most anti-bot vendors — running on cron
# would produce false-positive failures unrelated to actual DOM
# regressions.
#
# This workflow is therefore manual-only. The recommended schedule is
# a local launchd / systemd-timer / cron job invoking
# `agentsearch canary --gh-issue` from the user's own machine. See
# docs/CANARY.md for ready-made templates.
#
# Manual trigger: GitHub repo → Actions → canary-on-demand → Run workflow.

on:
  workflow_dispatch:
    inputs:
      engines:
        description: "Comma-separated engine subset (blank = all)"
        required: false
        default: ""
      parallel:
        description: "Concurrent workers"
        required: false
        default: "4"

jobs:
  canary:
    name: Canary across engines
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install AgentSearch + deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run canary (datacenter IP — expect false positives)
        env:
          AGENTSEARCH_LOG: WARNING
        run: |
          python -m agent_search.canary \
            --engines "${{ github.event.inputs.engines }}" \
            --parallel "${{ github.event.inputs.parallel || '4' }}" \
            --report canary_report.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-report-${{ github.run_id }}
          path: canary_report.json
          retention-days: 30
